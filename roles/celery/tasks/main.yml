- name: sync source
  git:
    repo: https://github.com/qiime2/library
    dest: /home/ubuntu/library-src
    # TODO: update this before merging
    version: infrastructure.qiime2.org-worker
    update: yes

- name: start containers
  become: True
  command: docker-compose -f /home/ubuntu/library-src/docker-compose.yml up -p library -e SPLEEN={{ SPLEEN }} -d
  register: dc
  changed_when: '"Creating library-worker_1" in dc.stderr'
